<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz Web</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
  <div class="container py-4">
    <div class="text-center mb-4">
      <h1 class="fw-bold">Flashcard Quiz Web</h1>
      <p class="text-muted mb-0">Dự án giữa kỳ môn thực tập cơ sở</p>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h4 mb-3">Danh sách bộ flashcard</h2>
        <div id="deckList" class="mb-4"></div>

        <h3 class="h5 mb-3">Tạo bộ flashcard mới</h3>
        <div class="row g-3">
          <div class="col-md-5">
            <input type="text" id="deckTitle" class="form-control" placeholder="Tên bộ thẻ">
          </div>
          <div class="col-md-5">
            <input type="text" id="deckDescription" class="form-control" placeholder="Mô tả bộ thẻ">
          </div>
          <div class="col-md-2 d-grid">
            <button id="createDeckBtn" class="btn btn-primary">Tạo bộ thẻ</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h4 mb-3">Chi tiết bộ thẻ</h2>
        <h3 id="deckTitleDisplay" class="h5"></h3>
        <p id="deckDescriptionDisplay" class="text-muted"></p>

        <ul id="cardList" class="mb-4"></ul>

        <h3 class="h5 mb-3">Thêm flashcard</h3>
        <div class="row g-3">
          <div class="col-md-5">
            <input type="text" id="cardFront" class="form-control" placeholder="Mặt trước">
          </div>
          <div class="col-md-5">
            <input type="text" id="cardBack" class="form-control" placeholder="Mặt sau">
          </div>
          <div class="col-md-2 d-grid">
            <button id="addCardBtn" class="btn btn-success">Thêm thẻ</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h4 mb-3">Học flashcard</h2>
        <p id="cardCounter" class="text-muted"></p>
        <div id="flashcardDisplay" class="border rounded p-4 bg-white mb-3"></div>
        <div class="d-flex gap-2">
          <button id="flipBtn" class="btn btn-warning">Lật thẻ</button>
          <button id="nextBtn" class="btn btn-secondary">Tiếp theo</button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 class="h4 mb-3">Quiz</h2>
        <div id="quizContainer"></div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h4 mb-3">Kết quả</h2>
        <div id="resultContainer"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="storage.js"></script>
  <script src="flashcard.js"></script>
  <script src="quiz.js"></script>
  <script src="script.js"></script>
</body>

</html>
