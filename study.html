<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học flashcard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7ff;
        }

        .soft-card {
            border: 1px solid #e5edff;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
            border-radius: 1.25rem;
        }

        .page-hero {
            background: linear-gradient(135deg, #ffffff, #eef4ff);
            border: 1px solid #dbe7ff;
        }

        .flashcard-box {
            min-height: 320px;
            background: #f8fbff;
            border: 1px solid #dbe7ff;
            border-radius: 1.5rem;
        }

        .text-subtle {
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .flashcard-box {
                min-height: 240px;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div id="header-container"></div>
    <!-- End Header -->

    <div class="container py-5">

        <!-- Nút quay lại -->
        <div class="mb-4">
            <button id="backToDetailBtn" class="btn btn-outline-primary rounded-pill px-4">
                ← Quay lại chi tiết bộ thẻ
            </button>
        </div>

        <!-- Header study -->
        <section class="page-hero soft-card p-4 p-md-5 mb-4">
            <div class="w-100">
                <p class="text-uppercase fw-semibold text-primary small mb-2">
                    Chế độ học flashcard
                </p>

                <h1 id="deckName" class="fw-bold mb-4">
                    English Basic
                </h1>

                <div class="d-flex justify-content-between align-items-center text-subtle fw-semibold mb-2">
                    <span id="cardCounter">Thẻ 1 / 4</span>
                    <span id="progressPercent">25%</span>
                </div>

                <div class="progress" style="height: 12px; border-radius: 999px;">
                    <div id="progressBar" class="progress-bar bg-primary" role="progressbar" style="width: 25%;"></div>
                </div>
            </div>
        </section>

        <!-- Flashcard -->
        <section class="soft-card bg-white p-4 p-md-5">
            <div class="text-center mb-4">
                <p class="text-uppercase fw-semibold text-subtle small mb-0">
                    Flashcard hiện tại
                </p>
            </div>

            <div id="flashcardBox"
                class="flashcard-box d-flex align-items-center justify-content-center text-center px-4 py-5 mx-auto">
                <div>
                    <p id="cardSideLabel" class="text-uppercase fw-semibold text-subtle small mb-3">
                        Mặt trước
                    </p>

                    <div id="flashcardText" class="fw-bold display-6">
                        Hello
                    </div>
                </div>
            </div>

            <!-- Nút điều khiển -->
            <div class="row g-3 mt-4">
                <div class="col-md-6">
                    <button id="flipBtn" class="btn btn-warning text-white w-100 rounded-pill py-3 fw-semibold">
                        Lật thẻ
                    </button>
                </div>
                <div class="col-md-6">
                    <button id="nextBtn" class="btn btn-primary w-100 rounded-pill py-3 fw-semibold">
                        Tiếp theo
                    </button>
                </div>
            </div>

            <!-- Gợi ý -->
            <div class="alert alert-primary mt-4 mb-0">
                Mẹo: Hãy đoán nghĩa trước khi bấm <strong>Lật thẻ</strong> để ghi nhớ tốt hơn.
            </div>
        </section>
    </div>

    <script src="storage.js"></script>
    <script src="flashcard.js"></script>
    <script src="study.js"></script>
    <script src="import-header.js"></script>
</body>

</html>
