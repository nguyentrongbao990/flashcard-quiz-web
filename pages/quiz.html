<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm Quiz Flashcard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">

    <link rel="stylesheet" href="../css/header.css">
</head>

<body class="bg-light">
    <!-- Header -->
    <div id="header-container"></div>
    <!-- End Header -->

    <div class="container mt-5">
        <div class="mb-4">
            <a href="home.html" class="text-decoration-none text-primary fw-bold">
                &larr; Quay lại danh sách bộ thẻ
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div id="quizContainer">
                    <div class="text-center card p-4 shadow-sm border-0">
                        <h4 class="mb-3 fw-bold">Sẵn sàng làm bài?</h4>
                        <p class="text-muted small">Hệ thống sẽ lấy dữ liệu từ bộ thẻ bạn vừa chọn.</p>
                        <button class="btn btn-success px-4" onclick="startQuiz()">
                            Bắt đầu Quiz ngay
                        </button>
                    </div>
                </div>
                
                <div id="resultContainer" class="mt-4"></div>

            </div>
        </div>
    </div>

    <script src="../js/core/storage.js"></script>
    <script src="../js/pages/quiz.js"></script>
    <script src="../js/shared/import-header.js"></script>

</body>

</html>
