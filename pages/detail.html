<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết bộ thẻ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/header.css">

  <style>
    body {
      background: #f4f7ff;
    }

    .page-hero {
      background: linear-gradient(135deg, #ffffff, #eef4ff);
      border: 1px solid #dbe7ff;
    }

    .soft-card {
      border: 1px solid #e5edff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.08);
      border-radius: 1.25rem;
    }

    .section-title {
      font-weight: 700;
      color: #1f2937;
    }

    .text-subtle {
      color: #6b7280;
    }

    .badge-soft {
      background: #dbeafe;
      color: #2563eb;
      font-weight: 600;
    }

    .input-soft {
      background: #f8fbff;
      border: 1px solid #dbe7ff;
    }

    .input-soft:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }
  </style>
</head>

<body>
  <!-- Header -->
  <div id="header-container"></div>
  <!-- End Header -->

  <div class="container py-5">

    <!-- Nút quay lại -->
    <div class="mb-4">
      <button id="backToListBtn" class="btn btn-outline-primary rounded-pill px-4">
        ← Quay lại danh sách bộ thẻ
      </button>
    </div>

    <!-- Tiêu đề -->
    <section class="page-hero soft-card p-4 p-md-5 mb-4">
      <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start gap-4">
        <div>
          <p class="text-uppercase fw-semibold text-primary small mb-2">Chi tiết bộ thẻ</p>
          <h1 class="fw-bold mb-3">
            Bộ thẻ:
            <span id="deckTitleDisplay" class="text-primary">English Basic</span>
          </h1>
          <p id="deckDescriptionDisplay" class="text-subtle fs-5 mb-0">
            Mô tả bộ thẻ sẽ hiển thị ở đây.
          </p>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button id="goToStudyBtn" class="btn btn-warning text-white rounded-pill px-4 py-2 fw-semibold">
            Học flashcard
          </button>
          <button id="goToQuizBtn" class="btn btn-success rounded-pill px-4 py-2 fw-semibold">
            Làm quiz
          </button>
        </div>
      </div>
    </section>

    <!-- Nội dung chính -->
    <div class="row g-4">

      <!-- Thêm flashcard -->
      <div class="col-lg-4">
        <div class="soft-card bg-white p-4 h-100">
          <div class="mb-4">
            <h2 class="section-title h4 mb-2">Thêm flashcard</h2>
            <p class="text-subtle mb-0">
              Nhập nội dung mặt trước và mặt sau để thêm thẻ mới vào bộ thẻ hiện tại.
            </p>
          </div>

          <div class="mb-3">
            <label for="cardFront" class="form-label fw-semibold">Mặt trước</label>
            <textarea id="cardFront" rows="4" class="form-control input-soft" placeholder="Ví dụ: apple"></textarea>
          </div>

          <div class="mb-4">
            <label for="cardBack" class="form-label fw-semibold">Mặt sau</label>
            <textarea id="cardBack" rows="4" class="form-control input-soft" placeholder="Ví dụ: quả táo"></textarea>
          </div>

          <button id="addCardBtn" type="button" class="btn btn-success w-100 rounded-pill py-3 fw-semibold">
            Thêm thẻ
          </button>
        </div>
      </div>

      <!-- Danh sách thẻ -->
      <div class="col-lg-8">
        <div class="soft-card bg-white p-4">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
              <h2 class="section-title h4 mb-1">Danh sách thẻ</h2>
              <p class="text-subtle mb-0">Các flashcard hiện có trong bộ thẻ này.</p>
            </div>

            <span id="cardCountBadge" class="badge badge-soft rounded-pill px-3 py-2">
              0 thẻ
            </span>
          </div>

          <div id="emptyState" class="alert alert-light border text-center text-subtle d-none">
            Chưa có flashcard nào trong bộ này.
          </div>

          <div id="cardList" class="row g-4">
            <!-- JS sẽ render card ở đây -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/core/storage.js"></script>
  <script src="../js/core/flashcard.js"></script>
  <script src="../js/pages/detail.js"></script>
  <script src="../js/shared/import-header.js"></script>
</body>

</html>
